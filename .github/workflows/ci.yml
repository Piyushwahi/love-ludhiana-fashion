name: CI/CD Pipeline

on:
  push:
    branches: [ main, staging, production ]
  pull_request:
    branches: [ main, staging, production ]

jobs:
  # ── Backend CI ─────────────────────────────────
  backend-ci:
    name: Backend Linting, Typing, and Testing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Check Formatting (Black)
        run: black --check app tests

      - name: Linting (Ruff)
        run: ruff check app tests

      - name: Type Checking (MyPy)
        run: mypy app

      - name: Run Tests (Pytest)
        run: pytest --cov=app --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/love_ludhiana_test
          APP_ENV: testing
          JWT_SECRET: test-secret-not-for-prod
          JWT_REFRESH_SECRET: test-refresh-secret-not-for-prod

  # ── Frontend CI ────────────────────────────────
  frontend-ci:
    name: Frontend Linting and Build Verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Check Linting & Formatting
        run: |
          npx prettier --check "src/**/*.{ts,tsx,css,json}"
          npx eslint .

      - name: Build Verification
        run: npm run build
